name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Telegram secrets are set
        shell: bash
        run: |
          if [ -z "${{ secrets.TELEGRAM_API_ID }}" ] || [ -z "${{ secrets.TELEGRAM_API_HASH }}" ]; then
            echo "ERROR: TELEGRAM_API_ID or TELEGRAM_API_HASH secret is empty or missing."
            echo "Make sure they are saved as repository secrets under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Create production .env
        shell: bash
        run: |
          echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}" > .env
          echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> .env

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build installer + portable and publish release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: telestorage-windows-installer-${{ github.ref_name }}
          path: |
            dist/*Setup*.exe
            dist/*Setup*.exe.blockmap

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: telestorage-windows-portable-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            !dist/*Setup*.exe
            !dist/*Setup*.exe.blockmap
